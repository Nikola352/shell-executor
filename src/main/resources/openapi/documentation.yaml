openapi: "3.1.0"
info:
  title: Shell Executor API
  version: "1.0.0"
paths:
  /executions:
    post:
      summary: Start a new execution
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            format: uuid
          description: >
            Client-generated UUID for idempotent submission. If provided and an execution
            with this key already exists, that execution is returned instead of creating a new one.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutionRequest"
      responses:
        "201":
          description: Execution started (or already exists for the given idempotency key)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        "400":
          description: Bad request (invalid command or malformed Idempotency-Key)
  /executions/{id}:
    get:
      summary: Get execution by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Execution found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"
        "400":
          description: Invalid ID
        "404":
          description: Execution not found
components:
  schemas:
    ExecutionRequest:
      type: object
      required:
        - command
        - resources
      properties:
        command:
          type: string
        resources:
          $ref: "#/components/schemas/ResourceRequirements"
    ResourceRequirements:
      type: object
      required:
        - cpuCount
        - memoryMb
      properties:
        cpuCount:
          type: integer
        memoryMb:
          type: integer
    Execution:
      type: object
      required:
        - id
        - command
        - status
      properties:
        id:
          type: integer
        command:
          type: string
        status:
          $ref: "#/components/schemas/ExecutionStatus"
        exitCode:
          type: integer
          nullable: true
        stdout:
          type: string
          nullable: true
        stderr:
          type: string
          nullable: true
    ExecutionStatus:
      type: string
      enum:
        - QUEUED
        - IN_PROGRESS
        - FINISHED
        - FAILED
