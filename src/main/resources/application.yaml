ktor:
  application:
    modules:
      - com.github.nikola352.ApplicationKt.module
  deployment:
    port: 8080
postgres:
  url: "jdbc:postgresql://localhost:5432/shell-executor"
  driver: "org.postgresql.Driver"
  user: postgres
  password: postgres
executor:
  type: docker
docker:
  host: "unix:///var/run/docker.sock"
  tls-verify: false
  cert-path: ""
